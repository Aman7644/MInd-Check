<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mental Health Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h2>Mental Health Dashboard</h2>
  <div>
    <button>Find Therapist</button>
    <button>Logout</button>
  </div>
</header>

<div class="container">

  <h3>Welcome 👋</h3>

  <!-- Daily Check-in -->
  <div class="card">
    <h4>Daily Check-in</h4>

    <input type="number" id="mood" placeholder="Mood (1-10)" />
    <textarea id="note" placeholder="Write how you feel..."></textarea>

    <button onclick="submitCheckin()">Submit</button>
  </div>

  <!-- Assessment -->
  <div class="card">
    <h4>Initial Assessment</h4>

    <form id="assessmentForm">
      
      <div id="questions"></div>

      <button type="submit">Submit Assessment</button>
    </form>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
