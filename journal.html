<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MindWell Journal</title>

  <style>

    :root{

      --bg-color:#f8f7f2;
      --card-bg:#fffefb;
      --text-main:#2d3436;
      --accent-green:#96b3a2;
      --border-color:#e0e0e0;
      --shadow:0 4px 12px rgba(0,0,0,0.05);
    }

    *{

      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI',Tahoma,sans-serif;
    }

    body{

      background:var(--bg-color);
      color:var(--text-main);
    }

    header{

      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 40px;
      background:var(--card-bg);
      border-bottom:1px solid var(--border-color);
      box-shadow:var(--shadow);
    }

    .logo{

      font-size:24px;
      font-weight:bold;
      color:var(--accent-green);
    }

    nav a{

      margin:0 12px;
      text-decoration:none;
      color:var(--text-main);
      font-weight:500;
    }

    nav a.active{

      background:var(--accent-green);
      color:white;
      padding:8px 15px;
      border-radius:8px;
    }

    .container{

      max-width:1000px;
      margin:40px auto;
      padding:20px;
    }

    .card{

      background:var(--card-bg);
      padding:25px;
      border-radius:15px;
      box-shadow:var(--shadow);
      border:1px solid var(--border-color);
      margin-bottom:25px;
    }

    h1{

      margin-bottom:20px;
    }

    h3{

      margin-bottom:15px;
      color:var(--accent-green);
    }

    textarea{

      width:100%;
      height:180px;
      padding:15px;
      border-radius:10px;
      border:1px solid var(--border-color);
      resize:none;
      font-size:16px;
      margin-top:10px;
      outline:none;
    }

    textarea:focus{

      border:1px solid var(--accent-green);
    }

    button{

      background:var(--accent-green);
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:8px;
      cursor:pointer;
      margin-top:15px;
      font-size:15px;
    }

    button:hover{

      opacity:0.9;
    }

    .prompt{

      background:#eef7f0;
      padding:15px;
      border-left:5px solid var(--accent-green);
      border-radius:10px;
      margin-bottom:20px;
      font-style:italic;
    }

    .entry{

      background:#f9f9f9;
      padding:15px;
      border-radius:10px;
      margin-top:15px;
      border-left:4px solid var(--accent-green);
    }

    .mood-buttons{

      display:flex;
      gap:10px;
      margin-top:15px;
      flex-wrap:wrap;
    }

    .mood-btn{

      padding:10px 15px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      background:#ddd;
      font-size:18px;
    }

    .mood-btn:hover{

      transform:scale(1.05);
    }

    footer{

      text-align:center;
      padding:30px;
      opacity:0.7;
    }

  </style>
</head>

<body>

<header>

  <div class="logo">
    🌿 MindWell
  </div>

  <nav>

    <a href="dashboard.html">
      Dashboard
    </a>

    <a href="journal.html" class="active">
      Journal
    </a>

    <a href="#">
      Resources
    </a>

    <a href="#">
      Profile
    </a>

  </nav>

</header>

<div class="container">

  <h1>
    📖 Personal Journal
  </h1>

  <!-- Journal Prompt -->

  <div class="card">

    <h3>
      🌈 Daily Reflection Prompt
    </h3>

    <div class="prompt">

      “What made you smile today,
      and what challenged you emotionally?”

    </div>

    <textarea
      id="journalText"
      placeholder="Write your thoughts here..."
    ></textarea>

    <!-- Mood Selection -->

    <div class="mood-buttons">

      <button class="mood-btn"
        onclick="selectMood('😊 Happy')">

        😊

      </button>

      <button class="mood-btn"
        onclick="selectMood('😔 Sad')">

        😔

      </button>

      <button class="mood-btn"
        onclick="selectMood('😰 Stressed')">

        😰

      </button>

      <button class="mood-btn"
        onclick="selectMood('😌 Calm')">

        😌

      </button>

      <button class="mood-btn"
        onclick="selectMood('😴 Tired')">

        😴

      </button>

    </div>

    <p id="selectedMood"
      style="
        margin-top:15px;
        font-weight:bold;
      ">

      Selected Mood:
      None

    </p>

    <button onclick="saveJournal()">

      Save Journal Entry

    </button>

  </div>

  <!-- Saved Entries -->

  <div class="card">

    <h3>
      📝 Saved Journal Entries
    </h3>

    <div id="entriesContainer">

      <p>
        No journal entries yet.
      </p>

    </div>

  </div>

</div>

<footer>

  💙 Express your emotions freely.
  Your thoughts matter.

</footer>

<script>

  let selectedMood = "None";

  function selectMood(mood){

    selectedMood = mood;

    document.getElementById(
      "selectedMood"
    ).innerText =
      "Selected Mood: " + mood;
  }

  function saveJournal(){

    const text =
      document.getElementById(
        "journalText"
      ).value;

    if(text.trim() === ""){

      alert(
        "Please write something first."
      );

      return;
    }

    const container =
      document.getElementById(
        "entriesContainer"
      );

    if(container.innerHTML.includes(
      "No journal entries yet."
    )){

      container.innerHTML = "";
    }

    const entry =
      document.createElement("div");

    entry.classList.add("entry");

    const date =
      new Date().toLocaleString();

    entry.innerHTML = `

      <p>
        <strong>📅 ${date}</strong>
      </p>

      <p>
        <strong>${selectedMood}</strong>
      </p>

      <br>

      <p>${text}</p>
    `;

    container.prepend(entry);

    alert(
      "Journal Saved Successfully 💙"
    );

    document.getElementById(
      "journalText"
    ).value = "";

    document.getElementById(
      "selectedMood"
    ).innerText =
      "Selected Mood: None";

    selectedMood = "None";
  }

</script>

</body>
</html>
